# ── Donk AI — Cloudflare Workers Configuration ──────────────────────
name = "donk-ai"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
NEXT_PUBLIC_APP_NAME = "Donk AI"
NEXT_PUBLIC_APP_URL = "https://donk.unykorn.org"
NEXT_PUBLIC_BRAND_PARENT = "Unykorn Media"
NEXT_PUBLIC_BRAND_URL = "https://unykorn.org"
NEXT_PUBLIC_SOLANA_NETWORK = "mainnet-beta"
NEXT_PUBLIC_SOLANA_RPC_URL = "https://api.mainnet-beta.solana.com"
NEXT_PUBLIC_TREASURY_WALLET = "2TQj18rWG3hMmJFT2YDdQMkNyPh7F6UxUYQFQEgZCm1N"
